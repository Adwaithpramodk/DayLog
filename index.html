<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DayLog — Daily Tracker (Appwrite)</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <!-- Auth Screen -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="header-logo" style="font-size: 32px; margin-bottom: 10px;">DayLog</div>
      <h1 id="auth-title">Welcome Back</h1>
      <p id="auth-subtitle" class="auth-subtitle">Sign in to sync your productivity</p>
      
      <form id="auth-form" data-mode="login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="auth-email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required />
        </div>
        <button type="submit" id="auth-submit" class="btn-primary">Sign In</button>
        <button type="button" id="toggle-auth-mode" class="auth-toggle">New here? Create account</button>
      </form>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen">
    <header class="app-header">
      <div class="header-logo">DayLog</div>
      <div class="header-meta">
        <div id="sync-status" class="sync-status"></div>
        <button id="btn-settings" class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <section class="hero-section">
        <div class="score-container">
          <div class="score-label">Daily Productivity</div>
          <div class="score-value-container">
            <span id="score-value">0</span><span class="score-percent">%</span>
          </div>
          <div class="score-bar-bg">
            <div id="score-bar-fill" class="score-bar-fill"></div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Current Streak</div>
            <div id="streak-value" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Tasks Done</div>
            <div id="task-count" class="stat-value">0/0</div>
          </div>
        </div>
      </section>

      <nav class="date-nav">
        <div id="active-date" class="current-date-display">Today</div>
        <button id="btn-go-today" class="btn-text" style="display:none">Back to Today</button>
      </nav>

      <div class="tab-content">
        <div id="panel-dashboard" class="tab-panel active">
          <div class="card">
            <h2 class="card-title">Habits</h2>
            <div id="habit-grid" class="habit-grid"></div>
          </div>
          <div class="card">
            <h2 class="card-title">Daily Tasks</h2>
            <ul id="task-list" class="task-list"></ul>
            <form id="task-form" class="task-form">
              <input id="new-task-input" type="text" placeholder="Add a task…" />
              <button type="submit" class="btn-add">+</button>
            </form>
          </div>
          <div class="card">
            <h2 class="card-title">Notes</h2>
            <textarea id="notes-area" class="notes-area" placeholder="Notes for today..."></textarea>
          </div>
        </div>
        <div id="panel-history" class="tab-panel">
          <div class="card">
            <h2 class="card-title">Weekly History</h2>
            <canvas id="history-chart" height="180"></canvas>
            <div id="history-list" class="history-list" style="margin-top:20px"></div>
          </div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="dashboard">
        <span>Today</span>
      </button>
      <button class="nav-item" data-tab="history">
        <span>History</span>
      </button>
    </nav>
  </div>

  <div id="settings-overlay" class="overlay">
    <div class="overlay-content full-page">
      <div class="overlay-header">
        <button id="btn-close-settings" class="btn-back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Dashboard
        </button>
        <h2>Settings</h2>
        <div style="width:40px"></div>
      </div>
      <div class="settings-section">
        <h3>Habits</h3>
        <div id="settings-habit-list"></div>
        <form id="add-habit-form" class="task-form">
          <input id="new-habit-input" type="text" placeholder="New habit…" />
          <button type="submit" class="btn-add">+</button>
        </form>
      </div>
      <div class="settings-section">
        <h3>Appearance</h3>
        <button id="btn-toggle-theme" class="btn-secondary" style="width:100%; margin-bottom:15px;">Toggle Dark Mode</button>
      </div>
      <div class="settings-section" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
        <button id="btn-logout" class="btn-danger-outline">
          Log out of DayLog
        </button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; color:white;">
    <div style="text-align:center;">
      <div class="spinner"></div>
      <div style="margin-top:15px">Syncing...</div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
